[TRADING]
; Danh sách symbol, phân cách bằng dấu phẩy
symbols       = XAUUSD, USDJPY
lot_size      = 0.01
sl_pips       = 0
max_positions = 1

[STRATEGY]
; So sánh T-1 (nến vừa đóng) với T-2 (nến trước đó)
; Điều kiện: body(T-1) > m × body(T-2) VÀ vol(T-1) > m × vol(T-2)
; Vào lệnh theo hướng nến T-1, yêu cầu T-2 cùng chiều

volume_multiplier = 1.33
price_multiplier  = 1.6

; Chốt lời khi lãi >= N% so với margin
take_profit_pct  = 120

; Cắt lỗ khi lỗ >= N% so với margin
stop_loss_pct    = 70

; Đóng lệnh sau N phút nếu chưa đạt mục tiêu
max_hold_minutes = 30

; Cửa sổ an toàn: bỏ qua nếu bot quét trễ hơn 30s sau khi nến mới mở
entry_window_sec = 30

[SYSTEM]
; Kiểm tra tín hiệu mỗi N giây
loop_interval = 5

; File log giao dịch Excel
excel_log = trades_log.xlsx
